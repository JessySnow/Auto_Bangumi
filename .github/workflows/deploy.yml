name: Deploy to Tailscale Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: |
          echo "IMAGE_NAME_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Build WebUI
        run: |
          cd webui
          pnpm install
          pnpm build
          cd ..
          rm -rf backend/src/dist
          cp -r webui/dist backend/src/

      - name: Inject Version via Tag
        working-directory: ./backend/src
        run: |
          VERSION="main-$(git rev-parse --short HEAD)"
          echo "VERSION='$VERSION'" >> module/__version__.py

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT || 22 }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
             echo "Authenticating sudo session..."
             echo ${{ secrets.SERVER_PASSWORD }} | sudo -S true
             
             echo "Logging into ghcr.io..."
             echo ${{ secrets.GITHUB_TOKEN }} | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
             
             echo "Pulling latest image..."
             sudo docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest
             
             echo "Stopping and removing existing container..."
             sudo docker stop auto_bangumi_mteam || true
             sudo docker rm auto_bangumi_mteam || true
             
             echo "Setting up Data Volume Config..."
             sudo mkdir -p /opt/auto_bangumi/config
             sudo mkdir -p /opt/auto_bangumi/data
             
             echo "Starting new container bounded to Tailscale IP..."
             sudo docker run -d \
               --name=auto_bangumi_mteam \
               -p ${{ secrets.TAILSCALE_IP }}:7892:7892 \
               -v /opt/auto_bangumi/config:/app/config \
               -v /opt/auto_bangumi/data:/app/data \
               --restart unless-stopped \
               ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest
             
             echo "Deployment finished and live at ${{ secrets.TAILSCALE_IP }}:7892!"
